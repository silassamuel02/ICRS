version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: icrs-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: icrs_db
      MYSQL_USER: icrs
      MYSQL_PASSWORD: icrs123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: D:\ICRS\backend
      dockerfile: Dockerfile
    container_name: icrs-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://mysql:3306/icrs_db
      DB_USERNAME: icrs
      DB_PASSWORD: icrs123
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  ai:
    build:
      context: D:\ICRS\ai
      dockerfile: Dockerfile
    container_name: icrs-ai
    restart: unless-stopped
    environment:
      PORT: 5000
    ports:
      - "5000:5000"

  frontend:
    build:
      context: D:\ICRS\icrs
      dockerfile: Dockerfile
    container_name: icrs-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8080/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
      - ai

volumes:
  mysql_data:
